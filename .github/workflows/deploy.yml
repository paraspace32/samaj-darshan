name: Deploy to GCP VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Inject secrets into server .env
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          GOOGLE_ANALYTICS_CREDENTIALS: ${{ secrets.GOOGLE_ANALYTICS_CREDENTIALS }}
        run: |
          # Use printf (not echo) to avoid trailing newline before base64-encoding
          ENCODED=$(printf '%s' "$GOOGLE_ANALYTICS_CREDENTIALS" | base64 -w 0)
          echo "Credential present: $([ -n "$GOOGLE_ANALYTICS_CREDENTIALS" ] && echo yes || echo NO - SECRET MISSING)"
          echo "Encoded length: ${#ENCODED}"
          # Single-line SSH to avoid heredoc expansion issues
          ssh -o StrictHostKeyChecking=yes "${USER}@${HOST}" \
            "cd /home/paras/samaj-darshan && sed -i '/^GOOGLE_ANALYTICS_CREDENTIALS=/d' .env && echo 'GOOGLE_ANALYTICS_CREDENTIALS=${ENCODED}' >> .env && echo 'Injected OK'"

      - name: Deploy (git pull, build & restart)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${USER}@${HOST}" "\
            set -e;\
            cd /home/paras/samaj-darshan;\
            git fetch --all;\
            git reset --hard origin/main;\
            sudo systemctl stop nginx 2>/dev/null || true;\
            sudo systemctl disable nginx 2>/dev/null || true;\
            docker system prune -f;\
            docker compose -f docker-compose.production.yml --env-file .env down --remove-orphans 2>/dev/null || true;\
            docker compose -f docker-compose.production.yml --env-file .env up -d --build;\
            echo '=== DB MIGRATE ===';\
            docker compose -f docker-compose.production.yml exec -T web bin/rails db:migrate RAILS_ENV=production;\
            echo '=== CACHE CLEAR ===';\
            docker compose -f docker-compose.production.yml exec -T web bin/rails runner \"Rails.cache.delete('ga_realtime_active_users'); Rails.cache.delete('ga_reporting_visitors')\" RAILS_ENV=production || true;\
            echo '=== HEALTH CHECK ===';\
            docker compose -f docker-compose.production.yml exec -T web bin/rails runner \"puts 'Boot OK'; puts 'push_subscriptions: ' + ActiveRecord::Base.connection.table_exists?('push_subscriptions').to_s; puts 'credentials: ' + Rails.application.credentials.secret_key_base.present?.to_s\" RAILS_ENV=production;\
            echo '=== WEB LOGS ===';\
            docker compose -f docker-compose.production.yml logs --tail=80 web;\
          "
