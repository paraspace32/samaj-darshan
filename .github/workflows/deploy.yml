name: Deploy to GCP VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Inject secrets into server .env
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          GOOGLE_ANALYTICS_CREDENTIALS: ${{ secrets.GOOGLE_ANALYTICS_CREDENTIALS }}
        run: |
          # Base64-encode the JSON — store the encoded string directly in .env
          # (dotenv does not evaluate shell commands, so we store base64 and decode in Ruby)
          ENCODED=$(echo "$GOOGLE_ANALYTICS_CREDENTIALS" | base64 -w 0)
          ssh -o StrictHostKeyChecking=yes "${USER}@${HOST}" bash << ENDSSH
            cd /home/paras/samaj-darshan
            sed -i '/^GOOGLE_ANALYTICS_CREDENTIALS=/d' .env
            echo "GOOGLE_ANALYTICS_CREDENTIALS=$ENCODED" >> .env
          ENDSSH

      - name: Deploy (git pull, build & restart)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${USER}@${HOST}" "\
            set -e;\
            cd /home/paras/samaj-darshan;\
            git fetch --all;\
            git reset --hard origin/main;\
            sudo systemctl stop nginx 2>/dev/null || true;\
            sudo systemctl disable nginx 2>/dev/null || true;\
            docker system prune -f;\
            docker compose -f docker-compose.production.yml --env-file .env down --remove-orphans 2>/dev/null || true;\
            docker compose -f docker-compose.production.yml --env-file .env up -d --build;\
            docker compose -f docker-compose.production.yml exec -T web bin/rails db:migrate RAILS_ENV=production || true;\
          "
