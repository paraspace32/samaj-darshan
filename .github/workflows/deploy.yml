name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add VM to known_hosts
        id: known_hosts
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          if [ -z "$HOST" ]; then
            echo "::error::DEPLOY_HOST secret is not set or is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Fast-path: use the pre-shared host key when available.
          # Set the DEPLOY_HOST_KEY secret to the output of:
          #   ssh-keyscan -H <your-vm-ip>
          if [ -n "$HOST_KEY" ]; then
            echo "$HOST_KEY" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
            echo "known_hosts populated from DEPLOY_HOST_KEY secret"
            echo "host_key_verified=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "DEPLOY_HOST_KEY secret is not set — falling back to ssh-keyscan"

          max_attempts=3
          for i in $(seq 1 $max_attempts); do
            echo "ssh-keyscan attempt $i of $max_attempts..."
            scan_exit=0
            ssh-keyscan -T 30 -H "$HOST" > /tmp/keyscan_out 2>/tmp/keyscan_err || scan_exit=$?
            if [ $scan_exit -eq 0 ] && [ -s /tmp/keyscan_out ]; then
              cat /tmp/keyscan_out >> ~/.ssh/known_hosts
              chmod 644 ~/.ssh/known_hosts
              echo "Host key obtained on attempt $i"
              echo "host_key_verified=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::ssh-keyscan attempt $i failed (exit=$scan_exit)"
            cat /tmp/keyscan_err 2>/dev/null || true
            if [ "$i" -lt "$max_attempts" ]; then
              sleep $((i * 5))
            fi
          done

          echo "::warning::Failed to fetch host key after $max_attempts attempts — will use accept-new"
          echo "::warning::For better security, set the DEPLOY_HOST_KEY repo secret to the output of: ssh-keyscan -H $HOST"
          echo "host_key_verified=false" >> "$GITHUB_OUTPUT"

      - name: Deploy (pull image & restart)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          HOST_KEY_VERIFIED: ${{ steps.known_hosts.outputs.host_key_verified }}
        run: |
          if [ "$HOST_KEY_VERIFIED" = "true" ]; then
            SSH_HOST_CHECK="yes"
          else
            SSH_HOST_CHECK="accept-new"
            echo "::warning::Using accept-new for StrictHostKeyChecking (trust on first use)"
          fi

          echo "=== Attempting SSH connection to ${USER}@${HOST} ==="
          ssh -o StrictHostKeyChecking="$SSH_HOST_CHECK" "${USER}@${HOST}" "\
            set -e;\
            echo '=== Remote: connection established ===';\
            cd /home/paras/samaj-darshan;\
            fetch_ok=0; \
            for i in 1 2 3 4 5; do \
              echo \"git fetch attempt \$i...\";\
              if git fetch --all; then fetch_ok=1; break; fi; \
              echo \"git fetch attempt \$i failed, retrying in \${i}0s...\"; \
              sleep \"\${i}0\"; \
            done;\
            if [ \"\$fetch_ok\" -ne 1 ]; then echo 'git fetch failed after 5 attempts'; exit 1; fi;\
            echo 'git reset --hard origin/main';\
            git reset --hard origin/main;\
            echo 'Stopping nginx...';\
            sudo systemctl stop nginx 2>/dev/null || true;\
            sudo systemctl disable nginx 2>/dev/null || true;\
            echo 'Pulling docker image...';\
            docker compose -f docker-compose.production.yml pull web;\
            echo 'Starting containers...';\
            docker compose -f docker-compose.production.yml --env-file .env up -d;\
            echo 'Running migrations...';\
            docker compose -f docker-compose.production.yml exec -T web bin/rails db:migrate RAILS_ENV=production || true;\
            echo '=== Deploy complete ===';\
          "
