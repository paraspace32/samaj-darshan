name: Deploy to GCP VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add VM to known_hosts
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "::error::DEPLOY_HOST secret is not set or is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          max_attempts=5
          for i in $(seq 1 $max_attempts); do
            echo "ssh-keyscan attempt $i of $max_attempts..."
            if ssh-keyscan -T 30 -H "$HOST" >> ~/.ssh/known_hosts 2>/tmp/ssh-keyscan-stderr.log && [ -s ~/.ssh/known_hosts ]; then
              echo "Successfully obtained host key on attempt $i"
              break
            fi
            echo "::warning::ssh-keyscan attempt $i failed"
            cat /tmp/ssh-keyscan-stderr.log 2>/dev/null || true
            if [ "$i" -lt "$max_attempts" ]; then
              delay=$((i * 5))
              echo "Retrying in ${delay}s..."
              sleep "$delay"
              > ~/.ssh/known_hosts
            fi
          done

          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::Failed to fetch host key for DEPLOY_HOST after $max_attempts attempts"
            echo "Troubleshooting: verify the VM is running, SSH (port 22) is open to GitHub Actions IPs, and DEPLOY_HOST secret is correct."
            cat /tmp/ssh-keyscan-stderr.log 2>/dev/null || true
            exit 1
          fi

      - name: Deploy (git pull, build & restart)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${USER}@${HOST}" "\
            set -e;\
            cd /home/paras/samaj-darshan;\
            fetch_ok=0; \
            for i in 1 2 3 4 5; do \
              if git fetch --all; then fetch_ok=1; break; fi; \
              echo \"git fetch attempt \$i failed, retrying in \${i}0s...\"; \
              sleep \"\${i}0\"; \
            done;\
            if [ \"\$fetch_ok\" -ne 1 ]; then echo 'git fetch failed after 5 attempts'; exit 1; fi;\
            git reset --hard origin/main;\
            sudo systemctl stop nginx 2>/dev/null || true;\
            sudo systemctl disable nginx 2>/dev/null || true;\
            docker compose -f docker-compose.production.yml --env-file .env up -d --build;\
            docker compose -f docker-compose.production.yml exec -T web bin/rails db:migrate RAILS_ENV=production || true;\
          "
