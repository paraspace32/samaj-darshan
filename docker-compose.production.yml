services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: samaj_darshan
      POSTGRES_DB: samaj_darshan_production
      POSTGRES_PASSWORD: ${SAMAJ_DARSHAN_DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samaj_darshan"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/paraspace32/samaj-darshan:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      PORT: "80"
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_LEVEL: info
      SOLID_QUEUE_IN_PUMA: "true"
      RAILS_ASSUME_SSL: "true"
      RAILS_FORCE_SSL: "true"
      DB_HOST: db
      SAMAJ_DARSHAN_DATABASE_PASSWORD: ${SAMAJ_DARSHAN_DATABASE_PASSWORD}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID}
      GCS_BUCKET: ${GCS_BUCKET}
      GCS_CREDENTIALS: ${GCS_CREDENTIALS}
      GA_MEASUREMENT_ID: "G-KJBW0359PV"
      CACHE_VERSION: ${CACHE_VERSION:-v1}
    volumes:
      - storage:/rails/storage

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:2019/config/ 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  storage:
  caddy_data:
  caddy_config:
